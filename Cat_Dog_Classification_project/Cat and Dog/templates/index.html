<!DOCTYPE html>
<html>
<head>
    <title>Cat-Dog Classifier</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        h1 { color: #333; }
        input[type="file"] { margin: 20px 0; padding: 10px; }
        button { padding: 12px 24px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Upload a Cat or Dog Image</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".jpg,.jpeg,.png" required>
        <br>
        <button type="submit">Classify Image</button>
    </form>
</body>
</html>
